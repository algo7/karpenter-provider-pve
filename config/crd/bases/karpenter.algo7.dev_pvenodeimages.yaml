---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: pvenodeimages.karpenter.algo7.dev
spec:
  group: karpenter.algo7.dev
  names:
    categories:
    - karpenter
    kind: PVENodeImage
    listKind: PVENodeImageList
    plural: pvenodeimages
    shortNames:
    - pni
    singular: pvenodeimage
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.distribution.type
      name: Distribution
      type: string
    - jsonPath: .spec.distribution.version
      name: Version
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.templateVMID
      name: VMID
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PVENodeImage is the Schema for the pvenodeimages API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PVENodeImage.
            properties:
              baseImage:
                description: |-
                  baseImage specifies the source OS image used as the starting point
                  for the Packer build.
                properties:
                  checksum:
                    description: |-
                      checksum is the checksum of the ISO at url, either as a direct
                      "sha256:<hex>" string or a Packer-style reference like
                      "file:https://example.com/SHA256SUMS".
                    type: string
                  isoFile:
                    description: |-
                      isoFile is the path to a pre-uploaded ISO in Proxmox storage,
                      formatted as "<storage>:iso/<filename>" (e.g., "local:iso/ubuntu-24.04.iso").
                    pattern: ^[a-zA-Z0-9_-]+:iso/.+\.iso$
                    type: string
                  url:
                    description: |-
                      url is the HTTP(S) location of an OS installer ISO.
                      When set, checksum must also be set for verification.
                    pattern: ^https?://.+
                    type: string
                type: object
                x-kubernetes-validations:
                - message: exactly one of (url+checksum) or isoFile must be set
                  rule: (has(self.url) && has(self.checksum) && !has(self.isoFile))
                    || (!has(self.url) && !has(self.checksum) && has(self.isoFile))
              buildConfig:
                description: buildConfig specifies Proxmox infrastructure for the
                  Packer build.
                properties:
                  bridge:
                    description: bridge overrides the network bridge for the builder
                      VM during installation.
                    type: string
                  isoStoragePool:
                    description: |-
                      isoStoragePool overrides the storage pool used for the installer ISO
                      and cloud-init drives during the build. Defaults to storagePool if not set.
                    type: string
                  node:
                    description: node overrides the Proxmox node on which to run the
                      build.
                    type: string
                  storagePool:
                    description: storagePool overrides the storage pool for the resulting
                      template disk.
                    type: string
                required:
                - bridge
                - node
                - storagePool
                type: object
              distribution:
                description: |-
                  distribution specifies which Kubernetes distribution to pre-stage
                  in the built template.
                properties:
                  type:
                    description: type is the distribution family.
                    enum:
                    - rke2
                    - k3s
                    type: string
                  version:
                    description: |-
                      version is the distribution version, including distribution-specific
                      suffixes. Examples: "v1.33.4+rke2r1", "v1.33.4+k3s1".
                    pattern: ^v\d+\.\d+\.\d+.*$
                    type: string
                required:
                - type
                - version
                type: object
              packages:
                description: |-
                  packages is an optional list of additional APT packages to install
                  during the build, beyond the defaults required for Kubernetes nodes.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
              rebuildPolicy:
                description: rebuildPolicy controls when the controller rebuilds the
                  template.
                properties:
                  interval:
                    description: |-
                      interval is the rebuild cadence when trigger is Periodic.
                      Ignored for other triggers.
                    type: string
                  trigger:
                    default: OnSpecChange
                    description: trigger determines what causes a rebuild.
                    enum:
                    - OnSpecChange
                    - Periodic
                    - Manual
                    type: string
                type: object
              sshAuthorizedKeys:
                description: |-
                  sshAuthorizedKeys is an optional list of SSH public keys to inject
                  into the default user's authorized_keys file.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
              timezone:
                default: UTC
                description: |-
                  timezone sets the system timezone baked into the image, in IANA format
                  (e.g., "UTC", "Europe/Zurich", "America/New_York").
                type: string
            required:
            - baseImage
            - buildConfig
            - distribution
            type: object
          status:
            description: status defines the observed state of PVENodeImage.
            properties:
              conditions:
                description: |-
                  conditions describe the current state of the NodeImage.
                  Standard conditions include Ready, Building, and BuildFailed.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastBuildTime:
                description: lastBuildTime records when the current template was built.
                format: date-time
                type: string
              observedSpecHash:
                description: |-
                  observedSpecHash is a hash of the spec fields that affect the built
                  template. A mismatch between this value and the current spec hash
                  indicates a rebuild is needed.
                type: string
              templateNode:
                description: templateNode is the Proxmox node where the current template
                  lives.
                type: string
              templateVMID:
                description: |-
                  templateVMID is the Proxmox VMID of the currently available template.
                  Unset until the first successful build completes.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

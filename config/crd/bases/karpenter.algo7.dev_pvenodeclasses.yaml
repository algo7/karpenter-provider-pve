  names:
    categories:
    - karpenter
    kind: PVENodeClass
    listKind: PVENodeClassList
    plural: pvenodeclasses
    shortNames:
    - pnc
    singular: pvenodeclass
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.nodeImageRef.name
      name: Image
      type: string
    - jsonPath: .spec.instanceTypes.length()
      name: InstanceTypes
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PVENodeClass is the Schema for the pvenodeclasses API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PVENodeClass.
            properties:
              instanceTypes:
                description: |-
                  instanceTypes defines the set of VM shapes exposed to Karpenter's
                  scheduler for this NodeClass. Each entry becomes a selectable
                  instance type via the node.kubernetes.io/instance-type label.
                items:
                  description: |-
                    InstanceType defines a named VM shape that maps to a Karpenter instance
                    type. Karpenter's scheduler uses these to simulate node-addition decisions
                    against pending pods.
                  properties:
                    cpu:
                      description: cpu is the number of vCPUs for this instance type.
                      format: int32
                      minimum: 1
                      type: integer
                    diskGiB:
                      description: |-
                        diskGiB is the boot disk size in GiB for this instance type.
                        Must be greater than or equal to the disk size baked into the
                        referenced PVENodeImage, or Proxmox will reject the clone.
                      format: int32
                      minimum: 10
                      type: integer
                    memoryMiB:
                      description: memoryMiB is the amount of RAM in MiB for this
                        instance type.
                      format: int32
                      minimum: 512
                      type: integer
                    name:
                      description: |-
                        name is the instance type identifier (e.g., "small", "medium", "gpu").
                        Surfaced to Karpenter as node.kubernetes.io/instance-type.
                      minLength: 1
                      pattern: ^[a-z0-9][a-z0-9-]*$
                      type: string
                  required:
                  - cpu
                  - diskGiB
                  - memoryMiB
                  - name
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              network:
                description: network configures networking for cloned VMs.
                properties:
                  bridge:
                    description: bridge is the Proxmox network bridge attached to
                      cloned VMs.
                    minLength: 1
                    type: string
                  firewall:
                    default: false
                    description: firewall enables the Proxmox firewall on the VM network
                      interface.
                    type: boolean
                  vlanTag:
                    description: vlanTag is an optional VLAN ID for the VM network
                      interface.
                    format: int32
                    maximum: 4094
                    minimum: 1
                    type: integer
                required:
                - bridge
                type: object
              nodeImageRef:
                description: |-
                  nodeImageRef references the PVENodeImage used as the base template
                  for nodes provisioned under this NodeClass. The referenced image
                  must be cluster-scoped and reach Ready=True before nodes can be
                  provisioned.
                properties:
                  name:
                    description: name of the referenced PVENodeImage.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              placementTargets:
                description: |-
                  placementTargets lists the Proxmox hypervisor nodes (hosts) available
                  for VM placement within the configured Proxmox cluster, along with the
                  Karpenter topology.kubernetes.io/zone label each represents. At least
                  one entry is required; single-host Proxmox (non-cluster) setups use a single entry.
                  Multi-cluster Proxmox deployments (a Kubernetes cluster that spans across multiple Proxmox clusters) are not yet supported.
                items:
                  description: PlacementTarget maps a Proxmox node to a Karpenter
                    topology zone.
                  properties:
                    node:
                      description: node is the Proxmox node name (e.g., "pve-01")
                        where VMs may be placed.
                      minLength: 1
                      type: string
                    zone:
                      description: |-
                        zone is the Karpenter topology.kubernetes.io/zone label value this
                        Proxmox node represents. If empty, the node name is used as the zone.
                      type: string
                  required:
                  - node
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - node
                x-kubernetes-list-type: map
              storagePool:
                description: storagePool is the Proxmox storage pool that backs cloned
                  VM disks.
                type: string
              tags:
                description: |-
                  tags are additional Proxmox tags applied to cloned VMs. The
                  controller always adds its own management tag for filtering during
                  List operations; user-provided tags extend that set.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
            required:
            - instanceTypes
            - network
            - nodeImageRef
            - placementTargets
            - storagePool
            type: object
          status:
            description: status defines the observed state of PVENodeClass.
            properties:
              conditions:
                description: |-
                  conditions describe the current state of the NodeClass. The root
                  Ready condition aggregates from TemplateResolved and NodeImageReady.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

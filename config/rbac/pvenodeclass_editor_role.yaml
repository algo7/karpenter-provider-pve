# This rule is not used by the project karpenter-provider-pve itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the karpenter.algo7.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: karpenter-provider-pve
    app.kubernetes.io/managed-by: kustomize
  name: pvenodeclass-editor-role
rules:
- apiGroups:
  - karpenter.algo7.dev
  resources:
  - pvenodeclasses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - karpenter.algo7.dev
  resources:
  - pvenodeclasses/status
  verbs:
  - get

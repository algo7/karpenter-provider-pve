# This rule is not used by the project karpenter-provider-pve itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to karpenter.algo7.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: karpenter-provider-pve
    app.kubernetes.io/managed-by: kustomize
  name: pvenodeimage-viewer-role
rules:
- apiGroups:
  - karpenter.algo7.dev
  resources:
  - pvenodeimages
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - karpenter.algo7.dev
  resources:
  - pvenodeimages/status
  verbs:
  - get
